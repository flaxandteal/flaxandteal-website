<section class="lrx2 our-services-about text-light bg-primary py-3">
  <div class="container">
    <div class="left">
      <img class="about-us-image" src="{{ .ctx.img_src}}" alt="{{ .ctx.img_alt | default (printf "an image that represents %s" (.ctx.heading | lower) )}}">
    </div>
    <div class="right">
      <h2>{{ .ctx.heading | markdownify }}</h2>
      <p>{{ .ctx.text | markdownify }}</p>
      <div class="mt-3">
        <a class="btn btn-primary-trans" href="{{.ctx.cta_link}}">{{.ctx.cta}}</a>
      </div>
    </div>
  </div>
</section>
